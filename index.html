<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业年报智能提取 Agent</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>年报提取 Agent</h2>
            <button class="btn-icon-only" id="closeSidebar">&times;</button>
        </div>
        <div class="sidebar-content">
            <div class="setting-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-..." />
                <small>阿里云 DashScope API Key</small>
            </div>
            <div class="setting-group">
                <label>模型</label>
                <select id="modelSelect">
                    <option value="qwen-plus" selected>qwen-plus</option>
                    <option value="qwen-turbo">qwen-turbo</option>
                    <option value="qwen-max">qwen-max</option>
                </select>
            </div>
            <hr>
            <button class="btn btn-outline btn-block" id="newChatBtn">+ 新对话</button>
            <button class="btn btn-outline btn-block" id="loadSample1Btn">示例：万科年报</button>
            <button class="btn btn-outline btn-block" id="loadSample2Btn">示例：腾讯年报</button>
        </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="chat-main">
        <!-- 顶部栏 -->
        <div class="chat-topbar">
            <button class="btn-icon-only" id="openSidebar">&#9776;</button>
            <h1>企业年报智能提取 Agent</h1>
            <div class="topbar-right">
                <span class="model-badge" id="modelBadge">qwen-plus</span>
            </div>
        </div>

        <!-- 消息区域 -->
        <div class="chat-messages" id="chatMessages">
            <!-- 欢迎消息 -->
            <div class="message agent-message">
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <p>你好！我是<strong>企业年报智能提取 Agent</strong>。</p>
                    <p>我可以帮你从企业年报中提取结构化数据，包括：</p>
                    <ul>
                        <li>资产负债表数据</li>
                        <li>管理层变动信息</li>
                        <li>附注重要事项</li>
                    </ul>
                    <p>你可以：</p>
                    <div class="action-chips">
                        <button class="chip" onclick="App.quickAction('sample1')">试用示例：万科年报</button>
                        <button class="chip" onclick="App.quickAction('sample2')">试用示例：腾讯年报</button>
                        <button class="chip" onclick="App.quickAction('upload')">上传PDF文件</button>
                        <button class="chip" onclick="App.quickAction('paste')">粘贴年报文本</button>
                    </div>
                    <p class="hint-text">首次使用请在左上角菜单中配置 API Key</p>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <div class="upload-preview" id="uploadPreview" style="display:none">
                <span id="uploadFileName"></span>
                <button class="btn-icon-only" id="removeUpload">&times;</button>
            </div>
            <div class="input-row">
                <button class="btn-icon-only attach-btn" id="attachBtn" title="上传PDF">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input type="file" id="fileInput" accept=".pdf" hidden />
                <textarea id="chatInput" placeholder="输入消息，或粘贴年报文本..." rows="1"></textarea>
                <button class="btn-send" id="sendBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script src="js/pdf-parser.js"></script>
    <script src="js/llm-client.js"></script>
    <script src="js/workflow.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
